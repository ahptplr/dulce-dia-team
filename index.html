        .member-list li { background: #334155; padding: 10px 15px; margin: 6px 0; border-radius: 6px; display: flex; justify-content: space-between; animation: fadeIn 0.5s ease-in-out; font-size: 1.1em; }

        function uploadInitialData() {
            database.ref('students').set(studentsData)
            .then(() => alert('ഒഫീഷ്യൽ ലിസ്റ്റ് വിജയകരമായി ഡാറ്റാബേസിലേക്ക് അപ്‌ലോഡ് ചെയ്തു!'))
            .catch(err => alert('Error: ' + err.message));
        }

        function hideAll() {
            document.getElementById('view-selector').classList.add('hidden');
            document.getElementById('projector-view').classList.add('hidden');
            document.getElementById('kiosk-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');
        }

        function initKiosk() {
            hideAll();
            document.getElementById('kiosk-view').classList.remove('hidden');
        }

        function updateRollNumbers() {
            let selectedClass = document.getElementById('kiosk-class').value;
            let rollSelect = document.getElementById('kiosk-roll');
            rollSelect.innerHTML = '<option value="">-- Select Roll No --</option>';
            
            if(!selectedClass) return;

            database.ref('students').once('value', snapshot => {
                let rollsAdded = [];
                snapshot.forEach(child => {
                    let s = child.val();
                    if(s.class === selectedClass && s.status === "hidden") {
                        if(!rollsAdded.includes(s.roll)) {
                            rollsAdded.push(s.roll);
                        }
                    }
                });
                
                rollsAdded.sort((a, b) => a - b);
                
                rollsAdded.forEach(rollNo => {
                    let opt = document.createElement('option');
                    opt.value = rollNo;
                    opt.innerText = "Roll No: " + rollNo;
                    rollSelect.appendChild(opt);
                });
            });
        }

        function submitKiosk() {
            let selectedClass = document.getElementById('kiosk-class').value;
            let rollNo = document.getElementById('kiosk-roll').value;
            if(!rollNo) return alert("ദയവായി റോൾ നമ്പർ സെലക്ട് ചെയ്യുക!");

            database.ref('students').once('value', snapshot => {
                let updates = {};
                snapshot.forEach(child => {
                    let s = child.val();
                    if(s.class === selectedClass && s.roll == rollNo) {
                        updates[child.key + '/status'] = "revealed";
                    }
                });
                
                database.ref('students').update(updates)
                .then(() => {
                    alert("നിങ്ങളുടെ ഗ്രൂപ്പ് വലിയ സ്ക്രീനിൽ പ്രഖ്യാപിച്ചിരിക്കുന്നു! 🎉");
                    document.getElementById('kiosk-roll').value = "";
                    updateRollNumbers();
                });
            });
        }

        let firstLoad = true;
        function initProjector() {
            hideAll();
            document.getElementById('projector-view').classList.remove('hidden');

            database.ref('students').on('value', snapshot => {
                document.getElementById('team-A').innerHTML = '';
                document.getElementById('team-B').innerHTML = '';
                document.getElementById('team-C').innerHTML = '';

                let listToRender = [];
                snapshot.forEach(child => {
                    let s = child.val();
                    if(s.status === "revealed") {
                        listToRender.push(s);
                    }
                });

                listToRender.forEach(s => {
                    let li = document.createElement('li');
                    let roleText = s.role !== "Member" ? ` [${s.role}]` : "";
                    li.innerText = `${s.name}${roleText}`;
                    
                    let span = document.createElement('span');
                    span.className = "class-tag";
                    span.innerText = s.class;
                    li.appendChild(span);

                    if(s.role === "Leader") li.className = "leader";
                    if(s.role === "Asst-Leader") li.className = "asst-leader";

                    document.getElementById('team-' + s.team).appendChild(li);
                });
                firstLoad = false;
            });

            database.ref('students').on('child_changed', snapshot => {
                let s = snapshot.val();
                if(s.status === "revealed" && !firstLoad) {
                    triggerRevealEffect(s.name, "TEAM " + s.team);
                }
            });
        }

        function triggerRevealEffect(name, team) {
            let overlay = document.getElementById('reveal-overlay');
            document.getElementById('reveal-name').innerText = name;
            document.getElementById('reveal-team').innerText = team;
            
            let teamColor = team === "TEAM A" ? "#f43f5e" : (team === "TEAM B" ? "#3b82f6" : "#10b981");
            document.getElementById('reveal-team').style.color = teamColor;

            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 4000);
        }

        function initAdmin() {
            hideAll();
            document.getElementById('admin-view').classList.remove('hidden');
            let select = document.getElementById('admin-student-select');
            select.innerHTML = '<option value="">-- Select Student --</option>';
            
            database.ref('students').once('value', snapshot => {
                snapshot.forEach(child => {
                    let s = child.val();
                    let opt = document.createElement('option');
                    opt.value = child.key;
                    opt.innerText = `${s.name} (${s.class} - Team ${s.team})`;
                    select.appendChild(opt);
                });
            });
        }

        function assignRole() {
            let key = document.getElementById('admin-student-select').value;
            let role = document.getElementById('admin-role-select').value;
            if(!key) return alert("ദയവായി ഒരു വിദ്യാർത്ഥിയെ സെലക്ട് ചെയ്യുക!");

            database.ref('students/' + key).update({ role: role })
            .then(() => {
                alert("സ്ഥാനം വിജയകരമായി അപ്ഡേറ്റ് ചെയ്തു!");
            });
        }
    </script>
