            classes.forEach(cls => {
                let btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = cls;
                btn.onclick = () => selectClass(cls, btn);
                container.appendChild(btn);
            });
            
            // റീസെറ്റ് ചെയ്യുന്നു
            selectedClassVal = "";
            selectedRollVal = "";
            document.getElementById('roll-buttons').innerHTML = '<p style="color:#64748b; font-size:0.9em;">(Please select a class first)</p>';
            document.getElementById('reveal-btn').style.display = 'none';
        }

        function selectClass(cls, btnElement) {
            selectedClassVal = cls;
            selectedRollVal = "";
            
            // തിരഞ്ഞെടുത്ത ക്ലാസ് ഹൈലൈറ്റ് ചെയ്യാൻ
            document.querySelectorAll('#class-buttons .opt-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            document.getElementById('reveal-btn').style.display = 'none';

            let rollContainer = document.getElementById('roll-buttons');
            rollContainer.innerHTML = '<span style="color:white;">Loading...</span>';

            // വേഗത്തിൽ റോൾ നമ്പറുകൾ കൊണ്ടുവരുന്നു
            database.ref('students').once('value', snapshot => {
                let rollsAdded = [];
                snapshot.forEach(child => {
                    let s = child.val();
                    if(s.class === cls && s.status === "hidden") {
                        if(!rollsAdded.includes(s.roll)) rollsAdded.push(s.roll);
                    }
                });
                
                rollsAdded.sort((a, b) => a - b);
                rollContainer.innerHTML = "";
                
                if(rollsAdded.length === 0) {
                    rollContainer.innerHTML = '<p style="color:#ef4444;">All students in this class are revealed!</p>';
                    return;
                }

                rollsAdded.forEach(rollNo => {
                    let btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerText = rollNo;
                    btn.onclick = () => selectRoll(rollNo, btn);
                    rollContainer.appendChild(btn);
                });
            });
        }

        function selectRoll(rollNo, btnElement) {
            selectedRollVal = rollNo;
            document.querySelectorAll('#roll-buttons .opt-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            
            // റോൾ നമ്പർ സെലക്ട് ചെയ്താലുടൻ REVEAL ബട്ടൺ കാണിക്കുന്നു
            document.getElementById('reveal-btn').style.display = 'block';
        }

        function submitKiosk() {
            if(!selectedClassVal || !selectedRollVal) return alert("Please select Class and Roll No!");

            document.getElementById('reveal-btn').innerText = "PROCLAIMING... ⏳";

            database.ref('students').once('value', snapshot => {
                let updates = {};
                snapshot.forEach(child => {
                    let s = child.val();
                    if(s.class === selectedClassVal && s.roll == selectedRollVal) {
                        updates[child.key + '/status'] = "revealed";
                    }
                });
                
                database.ref('students').update(updates)
                .then(() => {
                    document.getElementById('reveal-btn').innerText = "REVEAL MY TEAM 🎉";
                    // അടുത്ത ആൾക്ക് വേഗത്തിൽ ചെയ്യാൻ ഉടൻ തന്നെ സ്ക്രീൻ റീസെറ്റ് ചെയ്യുന്നു
                    renderClassButtons();
                });
            });
        }

        let firstLoad = true;
        function initProjector() {
            hideAll();
            document.getElementById('projector-view').classList.remove('hidden');

            database.ref('students').on('value', snapshot => {
                document.getElementById('team-A').innerHTML = '';
                document.getElementById('team-B').innerHTML = '';
                document.getElementById('team-C').innerHTML = '';

                let listToRender = [];
                snapshot.forEach(child => {
                    let s = child.val();
                    if(s.status === "revealed") {
                        listToRender.push(s);
                    }
                });

                listToRender.forEach(s => {
                    let li = document.createElement('li');
                   // റോൾ (Leader/Asst) കാണിക്കുന്നത് ഒഴിവാക്കി, പേര് മാത്രം കാണിക്കുന്നു
                    li.innerText = s.name;
                    
                    let span = document.createElement('span');
                    span.className = "class-tag";
                    span.innerText = s.class;
                    li.appendChild(span);

                    document.getElementById('team-' + s.team).appendChild(li);
                });
                firstLoad = false;
            });

            database.ref('students').on('child_changed', snapshot => {
                let s = snapshot.val();
                if(s.status === "revealed" && !firstLoad) {
                    triggerRevealEffect(s.name, "TEAM " + s.team);
                }
            });
        }

        function triggerRevealEffect(name, team) {
            let overlay = document.getElementById('reveal-overlay');
            document.getElementById('reveal-name').innerText = name;
            document.getElementById('reveal-team').innerText = team;
            
            let teamColor = team === "TEAM A" ? "#f43f5e" : (team === "TEAM B" ? "#3b82f6" : "#10b981");
            document.getElementById('reveal-team').style.color = teamColor;

            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 4000);
        }

        function initAdmin() {
            hideAll();
            document.getElementById('admin-view').classList.remove('hidden');
            let select = document.getElementById('admin-student-select');
            select.innerHTML = '<option value="">-- Select Student --</option>';
            
            database.ref('students').once('value', snapshot => {
                snapshot.forEach(child => {
                    let s = child.val();
                    let opt = document.createElement('option');
                    opt.value = child.key;
                    opt.innerText = `${s.name} (${s.class} - Team ${s.team})`;
                    select.appendChild(opt);
                });
            });
        }

        function assignRole() {
            let key = document.getElementById('admin-student-select').value;
            let role = document.getElementById('admin-role-select').value;
            if(!key) return alert("Please select a student!");

            database.ref('students/' + key).update({ role: role })
            .then(() => {
                alert("Role successfully updated!");
            });
        }
    </script>
</body>
</html>
